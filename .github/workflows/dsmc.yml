name: DSMC Completeness Reports

on:
  workflow_dispatch:
  push:
    branches:
      - dsmc

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore DSMC script from dsmc branchj
        run: |
          git fetch origin dsmc
          git show origin/dsmc:dsmc.py > dsmc.py

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run DSMC completeness scan
        run: python dsmc.py

      - name: Commit and push updated reports
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add meta/dsmc_complete_counts.csv meta/dsmc_missing_tasks.csv
          git commit -m "Update DSMC completeness reports" || echo "No changes to commit"
          git push origin main
